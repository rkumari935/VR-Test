<!DOCTYPE html>
<html>
<head>
  <title>Solar System</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Assets -->
  <a-assets>
    <img id="sunTexture" src="sun.jpg">
    <img id="venusTexture" src="venus.jpg">
    <img id="earthTexture" src="earth.jpg">
    <img id="marsTexture" src="mars.jpg">
    <img id="jupiterTexture" src="jupiter.jpg">
    <img id="saturnTexture" src="saturn.jpg">
    <img id="saturnRing" src="saturn_ring.png">
    <img id="spaceBackground" src="https://t4.ftcdn.net/jpg/00/81/55/69/360_F_81556974_8sF8cKszJaRfBGd5sDt1RXE2QbzDtQqs.jpg">
  </a-assets>

  <!-- Camera -->
  <a-entity position="0 2 20">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <!-- Lights -->
  <a-light type="ambient" intensity="0.8"></a-light>
  <a-light type="point" position="0 0 0" intensity="3"></a-light>

  <!-- Sun -->
  <a-sphere position="0 0 0" radius="1.5" src="#sunTexture" shader="flat"
            animation="property: material.color; to: red; dir: alternate; loop: true; dur: 2000">
  </a-sphere>

  <!-- Venus orbit -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
    <a-sphere position="2 0 0" radius="0.35" src="#venusTexture" shader="flat"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-sphere>
  </a-entity>

  <!-- Earth orbit -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
    <a-sphere position="3 0 0" radius="0.4" src="#earthTexture" shader="flat"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-sphere>
  </a-entity>

  <!-- Mars orbit -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 14000">
    <a-sphere position="5 0 0" radius="0.35" src="#marsTexture" shader="flat"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 7000"></a-sphere>
  </a-entity>

  <!-- Jupiter orbit -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 18000">
    <a-sphere position="7 0 0" radius="0.7" src="#jupiterTexture" shader="flat"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-sphere>
  </a-entity>

  <!-- Saturn orbit -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 22000">
    <!-- Saturn with rotation -->
    <a-sphere position="9 0 0" radius="0.6" src="#saturnTexture" shader="flat"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 11000"></a-sphere>
    <!-- Saturn ring stays still -->
    <a-ring position="9 0 0" radius-inner="0.7" radius-outer="1.2" src="#saturnRing" rotation="-90 0 0"></a-ring>
  </a-entity>

  <!-- Background -->
  <a-sky src="#spaceBackground"></a-sky>

</a-scene>
</body>
</html>
