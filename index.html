<!DOCTYPE html>
<html>
<head>
  <title>Solar System</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Assets (High-quality planet textures + Saturn rings + background) -->
  <a-assets>
    <img id="sunTexture" src="https://www.solarsystemscope.com/textures/download/2k_sun.jpg">
    <img id="venusTexture" src="https://www.solarsystemscope.com/textures/download/2k_venus_surface.jpg">
    <img id="earthTexture" src="https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg">
    <img id="marsTexture" src="https://www.solarsystemscope.com/textures/download/2k_mars.jpg">
    <img id="jupiterTexture" src="https://cdn.mos.cms.futurecdn.net/pR9pCBjB7tcodWJow8XVGU.jpg">
    <img id="saturnTexture" src="https://www.solarsystemscope.com/textures/download/2k_saturn.jpg">
    <img id="saturnRing" src="https://www.solarsystemscope.com/textures/download/2k_saturn_ring_alpha.png">
    <img id="spaceBackground" src="https://t4.ftcdn.net/jpg/00/81/55/69/360_F_81556974_8sF8cKszJaRfBGd5sDt1RXE2QbzDtQqs.jpg">
  </a-assets>

  <!-- Camera with WASD controls -->
  <a-entity position="0 2 20">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <!-- Lights -->
  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="point" position="0 0 0" intensity="4"></a-light>

  <!-- Sun -->
  <a-sphere position="0 0 0" radius="1.5"
            src="#sunTexture"
            animation="property: material.color; to: red; dir: alternate; loop: true; dur: 2000">
  </a-sphere>

  <!-- Venus -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
    <a-sphere position="2 0 0" radius="0.35" src="#venusTexture"></a-sphere>
  </a-entity>

  <!-- Earth -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    <a-sphere position="3 0 0" radius="0.4" src="#earthTexture"></a-sphere>
  </a-entity>

  <!-- Mars -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 7000">
    <a-sphere position="5 0 0" radius="0.35" src="#marsTexture"></a-sphere>
  </a-entity>

  <!-- Jupiter -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">
    <a-sphere position="7 0 0" radius="0.7" src="#jupiterTexture"></a-sphere>
  </a-entity>

  <!-- Saturn with Rings -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 11000" position="9 0 0">
    <a-sphere radius="0.6" src="#saturnTexture"></a-sphere>
    <a-ring radius-inner="0.7" radius-outer="1.2" src="#saturnRing" rotation="-90 0 0"></a-ring>
  </a-entity>

  <!-- Background (Outer Space) -->
  <a-sky src="#spaceBackground" rotation="0 -90 0"></a-sky>

</a-scene>
</body>
</html>
