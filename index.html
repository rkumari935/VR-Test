<!DOCTYPE html>
<html>
<head>
  <title>Solar System</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Assets (Textures) -->
  <a-assets>
    <img id="sunTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
    <img id="planetTexture" src="https://cdn.aframe.io/a-painter/images/sky.jpg">
  </a-assets>

  <!-- Camera with WASD controls -->
  <a-entity position="0 2 10">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <!-- Light -->
  <a-light type="point" position="0 0 0" intensity="2"></a-light>
  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- Sun -->
  <a-sphere position="0 0 0" radius="1.5"
            src="#sunTexture"
            animation="property: material.color; to: red; dir: alternate; loop: true; dur: 2000">
  </a-sphere>

  <!-- Planet 1 -->
  <a-entity rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    <a-sphere position="3 0 0" radius="0.4" src="#planetTexture"></a-sphere>
  </a-entity>

  <!-- Planet 2 -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 7000">
    <a-sphere position="5 0 0" radius="0.5" src="#planetTexture"></a-sphere>
  </a-entity>

  <!-- Planet 3 -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">
    <a-sphere position="7 0 0" radius="0.6" src="#planetTexture"></a-sphere>
  </a-entity>

  <!-- Planet 4 -->
  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 11000">
    <a-sphere position="9 0 0" radius="0.7" src="#planetTexture"></a-sphere>
  </a-entity>

  <!-- Background (stars) -->
  <a-sky color="black"></a-sky>

</a-scene>
</body>
</html>
