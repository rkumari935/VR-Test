<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Textured Sphere in Cube</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Load textures -->
      <a-assets>
        <img id="mars" src="./IMAGES/mars-surface.avif" crossorigin="anonymous">
      </a-assets>

      <!-- Spinning Sphere -->
      <a-sphere
        id="PGB-sphere"
        radius="0.5"
        position="0 2 -5.5"
        transparent="true"
        blending="additive"
        src="#mars"
        animation="property: rotation; to: 0 360 0; loop: true; dur:3000">
      </a-sphere>

      <!-- Transparent Cube -->
      <a-box
        id="PGB-Box"
        position="0 2 -5.5"
        transparent="true"
        blending="additive"
        color="gray"
        depth="1.5"
        height="1.5"
        width="1.5">
      </a-box>
    </a-scene>
  </body>
</html>
