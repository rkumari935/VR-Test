<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>

  <a-scene>

    <!-- Assets -->
    <a-assets>
      <img id="forestSky" src="https://t4.ftcdn.net/jpg/01/57/57/23/360_F_157572351_rYoKvAsiUWQFONBywSsH9Ujx1jzQMkU4.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- Background Sky -->
    <a-sky src="#forestSky"></a-sky>

    <!-- Text in the scene -->
    <a-text
      font="kelsonsans"
      color="#00FF00"
      value="Exploring the VR Forest!"
      width="6"
      position="0 2 -5"
      align="center"
    ></a-text>

  </a-scene>

</body>
</html>
