<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>

  <a-scene>

    <!-- Assets -->
    <a-assets>
      <!-- Using the image you provided -->
      <img id="forestSky" src="https://as2.ftcdn.net/jpg/00/78/89/41/220_F_78894153_6vehwXxxFzCbIyFjmZdrtoqxk219gWnd.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- Background Sky -->
    <a-sky src="#forestSky"></a-sky>

    <!-- Text in the scene -->
    <a-text
      font="kelsonsans"
      color="#FFFFFF"
      value="Welcome to the Forest VR!"
      width="6"
      position="0 2 -5"
      align="center"
    ></a-text>

  </a-scene>

</body>
</html>
