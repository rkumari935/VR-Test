<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const isLocal = ['localhost','127.0.0.1','[::1]'].includes(location.hostname);
        const src = isLocal
          ? 'http://localhost:8000/p01/IMAGES/heic2007a.jpg'
          : './IMAGES/heic2007a.jpg';

        const img = document.getElementById('nebula');
        img.setAttribute('src', src);

        document.querySelector('a-assets').addEventListener('loaded', () => {
          document.getElementById('mySky')
            .setAttribute('material', 'src: #nebula');
        });
      });
    </script>

    <a-scene> 

      <!-- Assets -->
      <a-assets>
        <img id="nebula" crossorigin="anonymous">
      </a-assets>

      <!-- Sky Background -->
      <a-sky id="mySky"
             src="#nebula"
             position="-2.5 0 -1.5">
      </a-sky>

      <!-- Updated Text -->
      <a-text
        font="kelsonsans"
        color="#FFFFFF"
        value="Welcome to my VR Space!"
        width="6"
        position="1 1 -4">
      </a-text>

    </a-scene>

  </body>
</html>
