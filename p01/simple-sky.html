<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>

  <a-scene> 

    <!-- Assets -->
    <a-assets>
      <!-- Using the provided nebula image from Wikipedia -->
      <img id="nebula" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Trifid_Nebula_by_Deddy_Dayag.jpg/960px-Trifid_Nebula_by_Deddy_Dayag.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- Background Sky -->
    <a-sky id="mySky"
           src="#nebula"
           position="-2.5 0 -1.5">
    </a-sky>

    <!-- Updated Text -->
    <a-text
      font="kelsonsans"
      color="#FFFFFF"
      value="Welcome to my VR Space!"
      width="6"
      position="1 1 -4">
    </a-text>

  </a-scene>

</body>
</html>
