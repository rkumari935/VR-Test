<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      // Component to toggle color independently
      AFRAME.registerComponent('my-color-toggle', {
        init: function() {
          const el = this.el;
          this.toggleColor = function() {
            const current = el.getAttribute('color');
            // Change color independently per cube
            if (current === 'blue') {
              el.setAttribute('color', 'orange');
            } else if (current === 'green') {
              el.setAttribute('color', 'purple');
            } else if (current === 'orange') {
              el.setAttribute('color', 'blue');
            } else if (current === 'purple') {
              el.setAttribute('color', 'green');
            }
          };
          el.addEventListener('click', this.toggleColor);
        },
        remove: function() {
          this.el.removeEventListener('click', this.toggleColor);
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse;" raycaster="objects: .rayclick;">
      
      <!-- Left cube: stays red -->
      <a-box id="one" position="-2 0 -7" color="red" class="rayclick"></a-box>
      
      <!-- Middle cube: changes from blue to orange -->
      <a-box id="two" position="0 0 -7" color="blue" class="rayclick" my-color-toggle></a-box>
      
      <!-- Right cube: changes from green to purple -->
      <a-box id="three" position="2 0 -7" color="green" class="rayclick" my-color-toggle></a-box>
      
    </a-scene>
  </body>
</html>
