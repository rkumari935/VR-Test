<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      // Component to toggle color on click
      AFRAME.registerComponent('my-color-toggle', {
        init: function() {
          let el = this.el;
          this.toggleColor = function() {
            let current = el.getAttribute('color');
            el.setAttribute('color', current === 'orange' ? 'yellow' : 'orange');
          };
          this.el.addEventListener('click', this.toggleColor);
        },
        remove: function() {
          this.el.removeEventListener('click', this.toggleColor);
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse;" raycaster="objects: .rayclick;">
      <!-- Left cube: stays red, no color change -->
      <a-box id="one" position="-2 0 -7" color="red" class="rayclick"></a-box>

      <!-- Middle cube: changes color on click -->
      <a-box id="two" position="0 0 -7" color="blue" class="rayclick" my-color-toggle></a-box>

      <!-- Right cube: changes color on click -->
      <a-box id="three" position="2 0 -7" color="green" class="rayclick" my-color-toggle></a-box>
    </a-scene>
  </body>
</html>
